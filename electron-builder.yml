asar: false

files:
  - package.json
  - dist/**
  - node_modules/**

npmRebuild: false

mac:
  category: public.app-category.developer-tools
  target:
    - target: dir
      arch:
        - arm64

artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: release
